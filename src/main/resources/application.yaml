server:
  port: 8081
spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5433/auth_service
    username: postgres
    password: 123456

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true


  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  secret: 8f5c2d9a1b7e4f6c8d0a3b5e7f9c1d2a8f4b6e0c3a5d7f9b1c2e4a6d8f0b3c5
  access-token-expiration: 3600000
